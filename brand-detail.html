<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<link rel="canonical" href="https://geoscope.jp/brand-detail.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブランド詳細 — Geoscope</title>
<meta name="description" content="ブランド詳細 — Geoscope | トレンドグラフ・AI別出現率・引用URL分析">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/gs-design.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
.layout{max-width:1000px;margin:0 auto;padding:80px 40px 80px;position:relative;z-index:1;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--t3);text-decoration:none;text-transform:uppercase;margin-bottom:28px;transition:var(--transition);}
.back-link:hover{color:var(--t2);}
.brand-header{display:flex;align-items:center;gap:16px;margin-bottom:32px;}
.brand-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;flex-shrink:0;}
.brand-title{font-family:'DM Serif Display',serif;font-size:clamp(28px,4vw,42px);font-weight:300;}
.brand-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:1px;margin-top:4px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.panel{background:var(--panel);border:1px solid var(--divider);border-radius:var(--radius-card);padding:24px;}
.panel:hover{border-color:var(--bd2);}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--divider);}
.panel-title{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;color:var(--tx);}
.panel-title svg{color:var(--t3);}
.panel-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);}

/* トレンドグラフ */
.trend-chart{position:relative;height:140px;margin-top:8px;}
.trend-grid{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none;}
.trend-grid-line{width:100%;height:1px;background:var(--divider);}
.trend-bars{display:flex;align-items:flex-end;gap:6px;height:100%;position:relative;z-index:1;}
.trend-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.trend-bar-inner{width:100%;flex:1;display:flex;align-items:flex-end;}
.trend-bar{width:100%;border-radius:6px 3px 0 0;transition:height .8s cubic-bezier(.25,1,.5,1);cursor:pointer;position:relative;}
.trend-bar:hover{opacity:.8;}
.trend-bar-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--divider);border-radius:6px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:9px;color:var(--tx);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;box-shadow:var(--shadow-sm);}
.trend-bar:hover .trend-bar-tip{opacity:1;}
.trend-date{font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);}

/* AI breakdown */
.ai-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.ai-row:last-child{margin-bottom:0;}
.ai-name{font-size:13px;font-weight:500;width:88px;flex-shrink:0;}
.ai-bar-bg{flex:1;height:4px;background:var(--hover);border-radius:99px;overflow:hidden;}
.ai-bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.25,1,.5,1);}
.ai-val{font-family:'DM Mono',monospace;font-size:12px;width:36px;text-align:right;flex-shrink:0;}

/* 引用URL */
.cite-item{padding:10px 14px;border:1px solid var(--divider);border-radius:8px;background:var(--hover);margin-bottom:8px;transition:var(--transition);}
.cite-item:hover{border-color:var(--bd2);}
.cite-item:last-child{margin-bottom:0;}
.cite-domain{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-bottom:3px;}
.cite-url{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
.cite-meta{display:flex;gap:6px;}
.cite-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:99px;border:1px solid var(--divider);color:var(--t3);}

/* 競合比較 */
.comp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--divider);}
.comp-row:last-child{border-bottom:none;}
.comp-rank{font-family:'DM Serif Display',serif;font-size:20px;font-weight:300;color:var(--t3);width:24px;flex-shrink:0;}
.comp-name{font-size:13px;font-weight:500;flex:1;}
.comp-rate{font-family:'DM Mono',monospace;font-size:12px;}
.you-badge{font-family:'DM Mono',monospace;font-size:8px;padding:2px 7px;border-radius:99px;background:rgba(139,124,248,.12);color:var(--accent);border:1px solid rgba(139,124,248,.3);margin-left:6px;}

/* アクションボタン */
.actions-row{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}

/* スキャン履歴テーブル */
.history-table{width:100%;border-collapse:collapse;font-size:12px;}
.history-table th{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--divider);text-align:left;}
.history-table th:not(:first-child){text-align:center;}
.history-table td{padding:10px 12px;border-bottom:1px solid var(--divider);color:var(--t2);}
.history-table td:not(:first-child){text-align:center;font-family:'DM Mono',monospace;font-size:11px;}
.history-table tr:last-child td{border-bottom:none;}
.history-table tr:hover td{color:var(--tx);background:rgba(255,255,255,.02);}

/* 空状態 */
.empty{text-align:center;padding:40px;color:var(--t3);}

@media(max-width:720px){
  .layout{padding:80px 20px 60px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .content-grid{grid-template-columns:1fr;}
  .actions-row{flex-direction:column;}
}
</style>
</head>
<body>


<nav class="gs-nav">
  <div style="display:flex;align-items:center;gap:28px;">
    <a href="index.html" class="gs-nav-logo">
      <div class="gs-nav-logo-dot"></div>
      <span class="gs-nav-brand">Geoscope</span>
    </a>
    <ul class="gs-nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="brands.html" class="active">Brands</a></li>
      <li><a href="alerts.html">Alerts</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
  </div>
  <div class="gs-nav-right">
    <div class="gs-status-pill"><div class="gs-status-dot"></div>Online</div>
    <button onclick="location.href='brands.html'" class="gs-btn gs-btn-ghost" style="padding:6px 12px;font-size:12px;">← Brands</button>
  </div>
</nav>

<div class="layout">

  <a href="brands.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    ブランド一覧に戻る
  </a>

  <!-- ブランドヘッダー -->
  <div class="brand-header gs-animate-up" id="brand-header">
    <div class="brand-avatar" id="brand-avatar" style="background:rgba(139,124,248,.15);color:var(--accent);">G</div>
    <div>
      <div class="brand-title" id="brand-title">読み込み中...</div>
      <div class="brand-sub" id="brand-sub">—</div>
    </div>
  </div>

  <!-- アクション -->
  <div class="actions-row gs-animate-up gs-delay-1">
    <button class="gs-btn gs-btn-accent" onclick="goScan()" style="font-size:13px;padding:10px 24px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      スキャン実行
    </button>
    <button class="gs-btn gs-btn-secondary" onclick="openEditModal()" style="font-size:13px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      編集
    </button>
    <button class="gs-btn gs-btn-secondary" onclick="exportBrandCsv()" style="font-size:13px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      CSVエクスポート
    </button>
    <button class="gs-btn gs-btn-ghost" onclick="createShareUrl()" style="font-size:13px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      共有URLを生成
    </button>
  </div>

  <!-- スタット -->
  <div class="stats-row gs-animate-up gs-delay-2">
    <div class="gs-stat">
      <div class="gs-stat-label">最新 SOV</div>
      <div class="gs-stat-num" id="stat-sov">—</div>
      <div class="gs-stat-sub" id="stat-diff">前回比 —</div>
    </div>
    <div class="gs-stat">
      <div class="gs-stat-label">スキャン回数</div>
      <div class="gs-stat-num" id="stat-scans">—</div>
      <div class="gs-stat-sub">累計実行回数</div>
    </div>
    <div class="gs-stat">
      <div class="gs-stat-label">引用URL数</div>
      <div class="gs-stat-num" id="stat-cites">—</div>
      <div class="gs-stat-sub">最新スキャン</div>
    </div>
    <div class="gs-stat">
      <div class="gs-stat-label">競合数</div>
      <div class="gs-stat-num" id="stat-comps">—</div>
      <div class="gs-stat-sub">トラッキング中</div>
    </div>
  </div>

  <!-- トレンド + AI Breakdown -->
  <div class="content-grid gs-animate-up gs-delay-3">

    <!-- トレンドグラフ -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          SOV トレンド
        </div>
        <span class="panel-sub" id="trend-period">直近8回</span>
      </div>
      <div style="position:relative;height:160px;margin-top:8px;">
        <canvas id="trend-chart"></canvas>
        <div id="trend-empty" class="empty" style="padding:20px;display:none;">スキャンデータがありません</div>
      </div>
    </div>

    <!-- AI Breakdown -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          AI別出現率
        </div>
        <span class="panel-sub">最新スキャン</span>
      </div>
      <div id="ai-breakdown">
        <div class="empty">データなし</div>
      </div>
    </div>
  </div>

  <!-- 競合比較 + 引用URL -->
  <div class="content-grid gs-animate-up gs-delay-4">

    <!-- 競合比較 -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          競合比較
        </div>
        <button class="panel-sub" style="background:none;border:none;cursor:pointer;color:var(--accent);" onclick="openAddComp()">+ 競合追加</button>
      </div>
      <div id="comp-list"><div class="empty">競合が登録されていません</div></div>
    </div>

    <!-- 引用URL -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          引用URL
        </div>
        <span class="panel-sub" id="cite-count">0件</span>
      </div>
      <div id="cite-list"><div class="empty">引用URLがありません</div></div>
    </div>
  </div>

  <!-- スキャン履歴 -->
  <div class="panel gs-animate-up" style="margin-bottom:24px;">
    <div class="panel-header">
      <div class="panel-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        スキャン履歴
      </div>
      <span class="panel-sub" id="history-count">—</span>
    </div>
    <div id="history-wrap" style="overflow-x:auto;">
      <div class="empty">データを読み込み中...</div>
    </div>
  </div>

</div>

<!-- 競合追加モーダル -->
<div class="gs-modal-overlay" id="comp-modal" style="display:none;" onclick="if(event.target===this)document.getElementById('comp-modal').style.display='none'">
  <div class="gs-modal" style="max-width:380px;">
    <h3 style="font-family:'DM Serif Display',serif;font-size:20px;font-weight:300;margin-bottom:20px;">競合を追加</h3>
    <div style="margin-bottom:16px;">
      <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:6px;">競合ブランド名</div>
      <input id="comp-name-input" class="gs-input" type="text" placeholder="例：競合A">
    </div>
    <div style="display:flex;gap:10px;">
      <button class="gs-btn gs-btn-accent" onclick="addComp()" style="flex:1;">追加</button>
      <button class="gs-btn gs-btn-ghost" onclick="document.getElementById('comp-modal').style.display='none'" style="flex:1;">キャンセル</button>
    </div>
  </div>
</div>

<script src="/gs-client.js"></script>
<script src="/themes.js"></script>
<script>
gsAuth.requireLogin();
initTheme();
mountThemeButton();

const AI_COLORS = { chatgpt:'var(--gn)', perplexity:'var(--pu)', gemini:'var(--am)', claude:'rgba(237,234,224,.6)' };
const AI_LABELS = { chatgpt:'ChatGPT', perplexity:'Perplexity', gemini:'Gemini', claude:'Claude' };

// URLパラメータからブランドID取得
const params = new URLSearchParams(location.search);
const brandId = params.get('id');
if (!brandId) { gsToast('ブランドIDが指定されていません', 'error'); setTimeout(()=>location.href='brands.html', 2000); }

let brandData = null;

document.addEventListener('DOMContentLoaded', async () => {
  if (!brandId) return;
  await loadBrand();
});

async function loadBrand() {
  gsLoading(true, 'ブランドデータを読み込み中...');
  try {
    const [brandRes, statsRes] = await Promise.all([
      gsBrands.get(brandId),
      gsBrands.stats(brandId),
    ]);
    brandData = brandRes.brand;
    renderHeader(brandData);
    renderStats(brandData, statsRes.stats);
    renderTrend(statsRes.stats);
    renderAiBreakdown(statsRes.stats);
    renderCompetitors(brandData.competitors || []);
    renderHistory(statsRes.stats);
  } catch (e) {
    gsToast(e.message, 'error');
  } finally {
    gsLoading(false);
  }
}

function renderHeader(b) {
  document.title = `${b.name} — Geoscope`;
  document.getElementById('brand-title').textContent = b.name;
  document.getElementById('brand-sub').textContent = b.description || `作成: ${new Date(b.created_at).toLocaleDateString('ja-JP')}`;
  const av = document.getElementById('brand-avatar');
  av.textContent = b.name.charAt(0).toUpperCase();
  av.style.background = (b.color || '#89c4d4') + '22';
  av.style.color = b.color || '#89c4d4';
}

function renderStats(b, stats) {
  const sov = stats?.latest_rate ?? b.latest_scan?.avg_rate ?? null;
  const diff = stats?.diff ?? 0;
  const rateColor = sov >= 70 ? 'var(--gn)' : sov >= 40 ? 'var(--am)' : sov !== null ? 'var(--rd)' : 'var(--t3)';
  document.getElementById('stat-sov').innerHTML = sov !== null ? `<span style="color:${rateColor}">${sov}</span><span style="font-size:18px;color:var(--t3)">%</span>` : '—';
  document.getElementById('stat-diff').innerHTML = diff !== 0 ? `前回比 <span style="color:${diff>0?'var(--gn)':'var(--rd)'}">${diff>0?'+':''}${diff}pt</span>` : '前回比 —';
  document.getElementById('stat-scans').textContent = stats?.total_scans ?? b.scan_count ?? '—';
  document.getElementById('stat-cites').textContent = b.latest_scan?.total_citations ?? '—';
  document.getElementById('stat-comps').textContent = (b.competitors || []).length;
}

let trendChartInstance = null;
function renderTrend(stats) {
  const trend = stats?.weekly_trend || [];
  const canvas = document.getElementById('trend-chart');
  const empty = document.getElementById('trend-empty');
  if (!trend.length) {
    canvas.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  canvas.style.display = 'block';
  empty.style.display = 'none';
  document.getElementById('trend-period').textContent = `直近${trend.length}回`;

  const labels = trend.map(t => {
    const d = new Date(t.date);
    return `${d.getMonth()+1}/${d.getDate()}`;
  });
  const rates = trend.map(t => t.rate);
  const pointColors = rates.map(r => r >= 70 ? '#7bbf96' : r >= 40 ? '#c9a96e' : '#c47a7a');

  if (trendChartInstance) trendChartInstance.destroy();
  trendChartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'SOV (%)',
        data: rates,
        borderColor: '#89c4d4',
        backgroundColor: 'rgba(139,124,248,0.08)',
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        pointRadius: 5,
        pointHoverRadius: 7,
        borderWidth: 2,
        fill: true,
        tension: 0.35,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#141920',
          borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1,
          titleColor: 'rgba(237,234,224,0.5)',
          bodyColor: '#cdd5e0',
          titleFont: { family: 'DM Mono', size: 9 },
          bodyFont: { family: 'DM Mono', size: 12 },
          callbacks: { label: ctx => ` ${ctx.raw}%` },
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: { color: 'rgba(237,234,224,0.3)', font: { family: 'DM Mono', size: 9 } },
        },
        y: {
          min: 0, max: 100,
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: 'rgba(237,234,224,0.3)',
            font: { family: 'DM Mono', size: 9 },
            callback: v => v + '%',
            stepSize: 25,
          },
        },
      },
    },
  });
}

function renderAiBreakdown(stats) {
  const el = document.getElementById('ai-breakdown');
  const ai = stats?.ai_avg;
  if (!ai) { el.innerHTML = '<div class="empty">データなし</div>'; return; }
  el.innerHTML = Object.entries(AI_LABELS).map(([key, label]) => {
    const rate = ai[key];
    if (rate === null || rate === undefined) return '';
    return `
      <div class="ai-row">
        <div class="ai-name" style="color:${AI_COLORS[key]};">${label}</div>
        <div class="ai-bar-bg"><div class="ai-bar-fill" style="width:${rate}%;background:${AI_COLORS[key]};opacity:.8;"></div></div>
        <div class="ai-val" style="color:${AI_COLORS[key]};">${rate}%</div>
      </div>`;
  }).join('');
}

function renderCompetitors(comps) {
  const el = document.getElementById('comp-list');
  if (!comps.length) { el.innerHTML = '<div class="empty">競合が登録されていません</div>'; return; }
  const you = brandData?.latest_scan?.avg_rate ?? 0;
  const allItems = [{ name:brandData.name, rate:you, isYou:true }, ...comps.map(c=>({name:c.name, rate:null, isYou:false, id:c.id}))];
  allItems.sort((a,b) => (b.rate??-1) - (a.rate??-1));
  el.innerHTML = allItems.map((item,i) => `
    <div class="comp-row">
      <div class="comp-rank" style="${item.isYou?'color:var(--accent)':''}">${i+1}</div>
      <div class="comp-name">
        ${item.name}
        ${item.isYou ? '<span class="you-badge">YOU</span>' : ''}
      </div>
      <div class="comp-rate" style="color:${item.isYou?'var(--accent)':'var(--t2)'};">${item.rate !== null ? item.rate+'%' : '—'}</div>
      ${!item.isYou && item.id ? `<button onclick="removeComp('${item.id}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;padding:2px 6px;">×</button>` : ''}
    </div>`).join('');
}

function renderHistory(stats) {
  const trend = stats?.weekly_trend || [];
  const wrap = document.getElementById('history-wrap');
  document.getElementById('history-count').textContent = `${trend.length}件`;
  if (!trend.length) { wrap.innerHTML='<div class="empty">スキャン履歴がありません</div>'; return; }
  const cell = v => v !== null && v !== undefined ? `${v}%` : '<span style="color:var(--t3)">—</span>';
  wrap.innerHTML = `<table class="history-table">
    <thead><tr><th>日時</th><th>平均SOV</th><th>ChatGPT</th><th>Perplexity</th><th>Gemini</th><th>Claude</th><th>引用URL</th></tr></thead>
    <tbody>${[...trend].reverse().map(t => {
      const rateColor = t.rate >= 70 ? 'var(--gn)' : t.rate >= 40 ? 'var(--am)' : 'var(--rd)';
      return `<tr>
        <td style="color:var(--t2);">${new Date(t.date).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</td>
        <td style="color:${rateColor};font-weight:500;">${t.rate}%</td>
        <td style="color:var(--gn)">${cell(t.chatgpt)}</td>
        <td style="color:var(--pu)">${cell(t.perplexity)}</td>
        <td style="color:var(--am)">${cell(t.gemini)}</td>
        <td style="color:var(--t2)">${cell(t.claude)}</td>
        <td style="color:var(--t3)">${t.total_citations ?? '—'}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// スキャン実行 → dashboard
function goScan() {
  if (brandData) {
    sessionStorage.setItem('gs_scan_brand_id', brandData.id);
    sessionStorage.setItem('gs_scan_brand_name', brandData.name);
  }
  location.href = '/dashboard.html';
}

// 競合追加
function openAddComp() { document.getElementById('comp-modal').style.display='flex'; setTimeout(()=>document.getElementById('comp-name-input').focus(), 100); }

async function addComp() {
  const name = document.getElementById('comp-name-input').value.trim();
  if (!name) { gsToast('競合名を入力してください','warn'); return; }
  try {
    await gsBrands.addCompetitor(brandId, name);
    document.getElementById('comp-name-input').value = '';
    document.getElementById('comp-modal').style.display = 'none';
    gsToast('追加しました','ok');
    await loadBrand();
  } catch(e) { gsToast(e.message,'error'); }
}

async function removeComp(compId) {
  const ok = await gsConfirm('この競合を削除しますか？');
  if (!ok) return;
  try {
    await gsBrands.removeCompetitor(brandId, compId);
    gsToast('削除しました','ok');
    await loadBrand();
  } catch(e) { gsToast(e.message,'error'); }
}

// 共有URL生成
async function createShareUrl() {
  try {
    const latestScanId = brandData?.latest_scan?.id;
    if (!latestScanId) { gsToast('スキャン結果がありません','warn'); return; }
    const { url } = await gsShare.create(latestScanId);
    await navigator.clipboard.writeText(url);
    gsToast('共有URLをコピーしました','ok');
  } catch(e) { gsToast(e.message,'error'); }
}

// CSVエクスポート
function exportBrandCsv() { gsExport.downloadCsv(brandId).catch(e=>gsToast(e.message,'error')); }

// 編集モーダル（brands.htmlに転送）
function openEditModal() { location.href = `brands.html?edit=${brandId}`; }

// Enterで競合追加
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('comp-modal').style.display !== 'none') addComp();
});

// ===== Supabase Realtime：スキャン結果のリアルタイム更新 =====
let realtimeChannel = null;

function startRealtime() {
  // GS_SUPABASE_URL / GS_SUPABASE_ANON が未設定の場合はスキップ
  const supabaseUrl = window.GS_SUPABASE_URL;
  const supabaseAnon = window.GS_SUPABASE_ANON;
  if (!supabaseUrl || !supabaseAnon || !brandId) return;

  // Supabase RealtimeはWebSocketで接続
  const wsUrl = supabaseUrl.replace('https://', 'wss://').replace('http://', 'ws://');
  const token = gsToken ? gsToken() : '';

  try {
    const ws = new WebSocket(
      `${wsUrl}/realtime/v1/websocket?apikey=${supabaseAnon}&vsn=1.0.0`
    );

    ws.onopen = () => {
      // チャンネル参加（scansテーブルのbrand_id=brandIdをフィルタ）
      ws.send(JSON.stringify({
        topic: `realtime:public:scans:brand_id=eq.${brandId}`,
        event: 'phx_join',
        payload: { user_token: token },
        ref: '1',
      }));
      realtimeChannel = ws;
      showRealtimeBadge(true);
    };

    ws.onmessage = (msg) => {
      try {
        const data = JSON.parse(msg.data);
        if (data.event === 'INSERT' && data.payload?.record) {
          const rec = data.payload.record;
          // 新しいスキャン結果が来たらUI更新
          gsToast('新しいスキャン結果が届きました', 'info');
          // stats更新
          document.getElementById('stat-sov').innerHTML =
            `<span style="color:${rec.avg_rate >= 70 ? 'var(--gn)' : rec.avg_rate >= 40 ? 'var(--am)' : 'var(--rd)'}">${rec.avg_rate}</span><span style="font-size:18px;color:var(--t3)">%</span>`;
          document.getElementById('stat-cites').textContent = rec.total_citations ?? '—';
          // フルリロード（グラフ等も更新）
          setTimeout(() => loadBrand(), 500);
        }
      } catch {}
    };

    ws.onclose = () => {
      showRealtimeBadge(false);
      realtimeChannel = null;
    };

    ws.onerror = () => {
      showRealtimeBadge(false);
    };
  } catch {}
}

function showRealtimeBadge(connected) {
  let badge = document.getElementById('realtime-badge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'realtime-badge';
    badge.style.cssText = 'display:inline-flex;align-items:center;gap:6px;font-family:"DM Mono",monospace;font-size:8px;letter-spacing:1.5px;color:var(--t3);';
    const actionRow = document.querySelector('.actions-row');
    if (actionRow) actionRow.appendChild(badge);
  }
  badge.innerHTML = connected
    ? `<span style="width:6px;height:6px;border-radius:50%;background:var(--gn);animation:gsSpin .7s linear infinite;display:inline-block;"></span>LIVE`
    : `<span style="width:6px;height:6px;border-radius:50%;background:var(--t3);display:inline-block;"></span>OFFLINE`;
}

// ページ離脱時にWebSocket切断
window.addEventListener('beforeunload', () => {
  if (realtimeChannel) realtimeChannel.close();
});

// ロード完了後にRealtime開始
document.addEventListener('DOMContentLoaded', () => {
  startRealtime();
});
</script>
