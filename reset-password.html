<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<link rel="canonical" href="https://geoscope.jp/reset-password.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワードリセット — Geoscope</title>
<meta name="description" content="パスワードリセット — Geoscope">
<link rel="stylesheet" href="/gs-design.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap">
<style>
:root{--bg:#070710;--bg2:#0b0b1c;--sf:#10101f;--bd:rgba(255,255,255,.06);--tx:#edeae0;--t2:rgba(237,234,224,.52);--t3:rgba(237,234,224,.22);--gn:#3ddc84;--rd:#ef6060;--pu:#8b7cf8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--bd);padding:48px 40px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;letter-spacing:7px;text-transform:uppercase;text-align:center;margin-bottom:32px;}
h1{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;margin-bottom:8px;}
p{font-size:13px;color:var(--t2);margin-bottom:24px;line-height:1.7;}
label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;display:block;margin-bottom:6px;}
input{width:100%;background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-size:14px;padding:12px 14px;outline:none;margin-bottom:16px;transition:border-color .2s;}
input:focus{border-color:var(--pu);}
button{width:100%;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:13px;background:var(--tx);color:var(--bg);border:none;cursor:pointer;}
button:disabled{opacity:.4;}
.msg{font-family:'DM Mono',monospace;font-size:9px;margin-top:12px;display:none;line-height:1.7;}
a{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--t3);text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Geoscope</div>
  <h1>パスワードリセット</h1>
  <p>登録済みのメールアドレスを入力してください。リセット用のリンクをお送りします。</p>
  <label>メールアドレス</label>
  <input id="email" type="email" placeholder="hello@example.com">
  <button id="btn" onclick="doReset()">リセットメールを送信 →</button>
  <div id="msg" class="msg"></div>
  <a href="login.html">← ログインに戻る</a>
</div>
<script src="/gs-client.js"></script>
<script src="/themes.js"></script>
<script>
initTheme();
async function doReset(){
  const email=document.getElementById('email').value.trim();
  const btn=document.getElementById('btn');
  const msg=document.getElementById('msg');
  if(!email){msg.style.display='block';msg.style.color='var(--rd)';msg.textContent='メールアドレスを入力してください';return;}
  btn.textContent='送信中...';btn.disabled=true;
  try{
    await gsAuth.resetPassword(email);
    msg.style.display='block';msg.style.color='var(--gn)';
    msg.textContent='送信しました。メールをご確認ください。';
    btn.style.display='none';
  }catch(e){
    msg.style.display='block';msg.style.color='var(--rd)';msg.textContent=e.message;
    btn.textContent='送信 →';btn.disabled=false;
  }
}
</script>
</body>
</html>
