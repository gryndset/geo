<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<link rel="canonical" href="https://geoscope.jp/reset-password.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワードリセット — Geoscope</title>
<link rel="stylesheet" href="/gs-design.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&family=DM+Mono:wght@400;500&display=swap">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{width:100%;max-width:368px;}
.card-logo{margin-bottom:36px;text-align:center;}
.card-logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px;color:var(--text-primary);margin-bottom:2px;}
.card-logo-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;}
.card-title{font-family:'DM Serif Display',Georgia,serif;font-size:26px;font-weight:400;letter-spacing:-.3px;margin-bottom:6px;}
.card-desc{font-size:13px;color:var(--text-secondary);margin-bottom:24px;line-height:1.7;}
.field-label{font-size:11px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:5px;}
input{width:100%;background:var(--bg-surface);border:1px solid var(--border-input);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;outline:none;margin-bottom:16px;transition:border-color .16s;border-radius:var(--radius-input);}
input::placeholder{color:var(--text-muted);}
input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(137,196,212,.1);}
button{width:100%;font-size:13px;font-weight:500;padding:11px;background:var(--text-primary);color:var(--bg);border:none;cursor:pointer;transition:opacity .16s;border-radius:var(--radius-button);}
button:disabled{opacity:.4;}
.msg{font-family:'DM Mono',monospace;font-size:10px;margin-top:12px;display:none;line-height:1.7;}
.back{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted);text-decoration:none;}
.back:hover{color:var(--text-secondary);}
</style>
</head>
<body>
<div class="card">
  <div class="card-logo">
    <div class="card-logo-name">Geoscope</div>
    <div class="card-logo-sub">GEO Tracking</div>
  </div>
  <div class="card-title">パスワードリセット</div>
  <div class="card-desc">登録済みのメールアドレスを入力してください。リセット用のリンクをお送りします。</div>
  <label class="field-label">メールアドレス</label>
  <input id="email" type="email" placeholder="hello@example.com">
  <button id="btn" onclick="doReset()">リセットメールを送信 →</button>
  <div id="msg" class="msg"></div>
  <a class="back" href="login.html">← ログインに戻る</a>
</div>
<script src="/gs-client.js"></script>
<script src="/themes.js"></script>
<script>
if (typeof initTheme === 'function') initTheme();
async function doReset() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  if (!email) { msg.style.display='block'; msg.style.color='var(--data-red)'; msg.textContent='メールアドレスを入力してください'; return; }
  btn.textContent='送信中...'; btn.disabled=true;
  try {
    await gsAuth.resetPassword(email);
    msg.style.display='block'; msg.style.color='var(--mint)';
    msg.textContent='送信しました。メールをご確認ください。';
    btn.style.display='none';
  } catch(e) {
    msg.style.display='block'; msg.style.color='var(--data-red)'; msg.textContent=e.message;
    btn.textContent='送信 →'; btn.disabled=false;
  }
}
</script>
</body>
</html>
