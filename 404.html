<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/gs-design.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&family=DM+Mono:wght@400;500&display=swap">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Geoscope</title>
<style>
body{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.wrap{}
.num{font-family:'DM Serif Display',Georgia,serif;font-size:clamp(100px,18vw,180px);font-weight:400;color:var(--text-faint,rgba(205,213,224,.14));line-height:1;letter-spacing:-4px;margin-bottom:20px;}
.msg{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:32px;}
.back{display:inline-block;font-size:12px;font-weight:500;color:var(--bg);background:var(--text-primary);text-decoration:none;padding:10px 24px;border-radius:var(--radius-button);transition:opacity .15s;}
.back:hover{opacity:.87;}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <div class="msg">ページが見つかりません</div>
  <a class="back" href="/">トップへ戻る</a>
</div>
<script src="/themes.js"></script>
<script>if(typeof initTheme==='function')initTheme();</script>
</body>
</html>
