<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<link rel="canonical" href="https://geoscope.jp/signup.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録 — Geoscope</title>
<meta name="description" content="Geoscopeに登録して、AIでのブランド出現率をトラッキングしましょう。">
<link rel="stylesheet" href="/gs-design.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&family=DM+Mono:wght@400;500&display=swap">
<style>
body{display:flex;flex-direction:column;min-height:100vh;}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{width:100%;max-width:368px;}
.card-logo{margin-bottom:36px;text-align:center;}
.card-logo-name{font-size:15px;font-weight:600;letter-spacing:-.3px;color:var(--text-primary);margin-bottom:2px;}
.card-logo-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;}
.card-title{font-family:'DM Serif Display',Georgia,serif;font-size:26px;font-weight:400;letter-spacing:-.3px;color:var(--text-primary);margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--text-secondary);margin-bottom:28px;line-height:1.6;}
.field{margin-bottom:14px;}
.field-label{font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:5px;letter-spacing:.1px;}
.field-input{width:100%;background:var(--bg-surface);border:1px solid var(--border-input);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border-color .16s;border-radius:var(--radius-input);}
.field-input::placeholder{color:var(--text-muted);}
.field-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(137,196,212,.1);}
.btn-primary{width:100%;font-size:13px;font-weight:500;padding:11px;background:var(--text-primary);color:var(--bg);border:none;cursor:pointer;margin-top:6px;transition:opacity .16s;border-radius:var(--radius-button);}
.btn-primary:hover{opacity:.87;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.err-msg{font-size:12px;margin-top:10px;display:none;}
.terms{font-size:11px;color:var(--text-muted);margin-top:14px;line-height:1.7;text-align:center;}
.terms a{color:var(--cyan);text-decoration:none;}
.link-row{text-align:center;font-size:12px;color:var(--text-muted);margin-top:12px;line-height:1.7;}
.link-row a{color:var(--cyan);text-decoration:none;}
.link-row a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="card-logo">
      <div class="card-logo-name">Geoscope</div>
      <div class="card-logo-sub">GEO Tracking</div>
    </div>
    <div class="card-title">アカウントを作成</div>
    <div class="card-sub">無料ではじめましょう。APIキーのみで即日利用可能。</div>

    <div class="field">
      <div class="field-label">表示名</div>
      <input id="name" class="field-input" type="text" placeholder="山田 太郎" autocomplete="name">
    </div>
    <div class="field">
      <div class="field-label">メールアドレス</div>
      <input id="email" class="field-input" type="email" placeholder="hello@example.com" autocomplete="email">
    </div>
    <div class="field">
      <div class="field-label">パスワード（8文字以上）</div>
      <input id="password" class="field-input" type="password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button class="btn-primary" id="signup-btn" onclick="doSignup()">アカウントを作成 →</button>
    <div class="err-msg" id="err-msg"></div>

    <div class="terms">登録することで<a href="#">利用規約</a>・<a href="#">プライバシーポリシー</a>に同意します</div>
    <div class="link-row">すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></div>
    <div class="link-row"><a href="index.html">← トップへ戻る</a></div>
  </div>
</div>

<script src="/gs-client.js"></script>
<script src="/themes.js"></script>
<script>
if (typeof gsIsLoggedIn === 'function' && gsIsLoggedIn()) window.location.href = '/dashboard.html';
if (typeof initTheme === 'function') initTheme();

async function doSignup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('signup-btn');
  const err = document.getElementById('err-msg');
  if (!name || !email || !password) { showErr('すべての項目を入力してください', 'red'); return; }
  if (password.length < 8) { showErr('パスワードは8文字以上にしてください', 'red'); return; }
  btn.textContent = '登録中...'; btn.disabled = true; err.style.display = 'none';
  try {
    await gsAuth.signup(email, password, name);
    showErr('確認メールを送信しました。メールをご確認ください。', 'green');
    btn.textContent = '登録完了';
  } catch (e) { showErr(e.message, 'red'); btn.textContent = 'アカウントを作成 →'; btn.disabled = false; }
}
function showErr(msg, type='red') {
  const err = document.getElementById('err-msg');
  err.textContent = msg;
  err.style.color = type === 'green' ? 'var(--mint)' : 'var(--data-red)';
  err.style.display = 'block';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
</script>
</body>
</html>
