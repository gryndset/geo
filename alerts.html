<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://geoscope.jp/alerts.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アラート管理 — Geoscope</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap">
<style>
:root{--bg:#070710;--bg2:#0b0b1c;--sf:#10101f;--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.12);--tx:#edeae0;--t2:rgba(237,234,224,.52);--t3:rgba(237,234,224,.22);--gn:#3ddc84;--am:#f0b429;--rd:#ef6060;--pu:#8b7cf8;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(7,7,16,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);}
.nl{text-decoration:none;}
.nlm{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;letter-spacing:7px;text-transform:uppercase;color:var(--tx);line-height:1;}
.nls{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;}
.nav-links{display:flex;gap:4px;list-style:none;}
.nav-links a{font-size:12px;color:var(--t2);text-decoration:none;padding:5px 12px;border-radius:3px;transition:all .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--tx);}
.nav-r{display:flex;gap:8px;align-items:center;}

.main{max-width:900px;margin:0 auto;padding:90px 40px 80px;}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;}
.btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;border:1px solid var(--bd);color:var(--t3);background:transparent;cursor:pointer;transition:all .2s;}
.btn:hover{color:var(--t2);border-color:var(--bd2);}
.btn-primary{background:var(--tx);color:var(--bg);border-color:var(--tx);}
.btn-primary:hover{opacity:.87;color:var(--bg);}

/* タブ */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd);margin-bottom:24px;}
.tab{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:10px 18px;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab:hover{color:var(--t2);}
.tab.active{color:var(--tx);border-bottom-color:var(--pu);}

/* アラートリスト */
.alert-list{display:flex;flex-direction:column;gap:1px;background:var(--bd);border:1px solid var(--bd);}
.alert-item{background:var(--bg);padding:20px 24px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;}
.alert-item:hover{background:rgba(255,255,255,.015);}
.alert-left{}
.alert-brand{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:4px;}
.alert-type{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--t3);}
.alert-threshold{font-family:'DM Mono',monospace;font-size:9px;color:var(--pu);margin-left:8px;}
.alert-right{display:flex;align-items:center;gap:12px;}
.toggle{position:relative;width:36px;height:20px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--sf);border:1px solid var(--bd);transition:.2s;}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:var(--t3);transition:.2s;}
.toggle input:checked + .toggle-slider{background:rgba(139,124,248,.2);border-color:var(--pu);}
.toggle input:checked + .toggle-slider:before{transform:translateX(16px);background:var(--pu);}
.alert-del{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--t3);background:none;border:1px solid var(--bd);padding:4px 10px;cursor:pointer;transition:all .2s;}
.alert-del:hover{color:var(--rd);border-color:rgba(239,96,96,.3);}

/* ログリスト */
.log-item{background:var(--bg);padding:16px 24px;border-bottom:1px solid var(--bd);}
.log-item:last-child{border-bottom:none;}
.log-msg{font-size:13px;color:var(--tx);margin-bottom:4px;}
.log-meta{font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--bd2);padding:36px;width:100%;max-width:440px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;margin-bottom:24px;}
.modal-field{margin-bottom:16px;}
.modal-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:6px;}
.modal-select,.modal-input{width:100%;background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-size:13px;padding:10px 14px;outline:none;font-family:'DM Sans',sans-serif;}
.modal-select{appearance:none;}
.modal-footer{display:flex;gap:10px;margin-top:24px;}

.empty{text-align:center;padding:60px 20px;color:var(--t3);}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--t2);margin-bottom:8px;}

@media(max-width:720px){
  nav{padding:0 20px;}
  .nav-links{display:none;}
  .main{padding:80px 20px 60px;}
  .page-header{flex-direction:column;align-items:flex-start;gap:16px;}
  .alert-item{grid-template-columns:1fr;gap:10px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nl">
    <div class="nlm">Geoscope</div>
    <div class="nls">GEO Tracking</div>
  </a>
  <ul class="nav-links">
    <li><a href="dashboard.html">ダッシュボード</a></li>
    <li><a href="brands.html">ブランド</a></li>
    <li><a href="alerts.html" class="active">アラート</a></li>
    <li><a href="settings.html">設定</a></li>
  </ul>
  <div class="nav-r"></div>
</nav>

<main class="main">
  <div class="page-header">
    <div class="page-title">アラート管理</div>
    <button class="btn btn-primary" onclick="openCreateModal()">+ アラートを追加</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('alerts', this)">アラート設定</div>
    <div class="tab" onclick="switchTab('logs', this)">発火履歴</div>
  </div>

  <div id="tab-alerts">
    <div id="alerts-container"><div class="empty"><div class="empty-title">読み込み中...</div></div></div>
  </div>
  <div id="tab-logs" style="display:none;">
    <div id="logs-container"><div class="empty"><div class="empty-title">読み込み中...</div></div></div>
  </div>
</main>

<!-- 作成モーダル -->
<div class="modal-overlay" id="modal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">アラートを追加</div>
    <div class="modal-field">
      <div class="modal-label">ブランド *</div>
      <select id="m-brand" class="modal-select"><option value="">選択してください</option></select>
    </div>
    <div class="modal-field">
      <div class="modal-label">アラートタイプ</div>
      <select id="m-type" class="modal-select">
        <option value="rate_drop">出現率が下落したとき</option>
        <option value="rate_rise">出現率が上昇したとき</option>
        <option value="competitor_overtake">競合に抜かれたとき</option>
        <option value="new_citation">新しい引用URLが見つかったとき</option>
      </select>
    </div>
    <div class="modal-field" id="threshold-field">
      <div class="modal-label">閾値（pt）</div>
      <input id="m-threshold" class="modal-input" type="number" value="10" min="1" max="100" placeholder="10">
      <div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);margin-top:6px;">例：10を指定すると出現率が10pt以上変動したときに通知</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="saveAlert()">作成する</button>
      <button class="btn" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<script src="/gs-client.js"></script>
<script src="/themes.js"></script>
<script>
gsAuth.requireLogin();
initTheme();
mountThemeButton();

const TYPE_LABELS = {
  rate_drop: '出現率下落',
  rate_rise: '出現率上昇',
  competitor_overtake: '競合に抜かれた',
  new_citation: '新規引用URL',
};

document.addEventListener('DOMContentLoaded', async () => {
  await Promise.all([loadAlerts(), loadLogs(), loadBrandsForModal()]);
});

// ===== アラート一覧 =====
async function loadAlerts() {
  try {
    const { alerts } = await gsAlerts.list();
    renderAlerts(alerts);
  } catch (e) { gsToast(e.message, 'error'); }
}

function renderAlerts(alerts) {
  const container = document.getElementById('alerts-container');
  if (!alerts || alerts.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-title">アラートがありません</div><p style="font-size:12px;color:var(--t3);margin-top:8px;">ブランドの出現率変動を通知します</p></div>`;
    return;
  }
  const list = document.createElement('div');
  list.className = 'alert-list';
  alerts.forEach(a => {
    const item = document.createElement('div');
    item.className = 'alert-item';
    item.innerHTML = `
      <div class="alert-left">
        <div class="alert-brand">${a.brands?.name || '不明'}</div>
        <div class="alert-type">${TYPE_LABELS[a.type] || a.type} <span class="alert-threshold">閾値: ${a.threshold}pt</span></div>
      </div>
      <div class="alert-right">
        <label class="toggle">
          <input type="checkbox" ${a.is_active ? 'checked' : ''} onchange="toggleAlert('${a.id}', this.checked)">
          <div class="toggle-slider"></div>
        </label>
        <button class="alert-del" onclick="deleteAlert('${a.id}')">削除</button>
      </div>
    `;
    list.appendChild(item);
  });
  container.innerHTML = '';
  container.appendChild(list);
}

async function toggleAlert(id, isActive) {
  try {
    await gsAlerts.update(id, { is_active: isActive });
    gsToast(isActive ? '有効にしました' : '無効にしました', 'ok');
  } catch (e) { gsToast(e.message, 'error'); }
}

async function deleteAlert(id) {
  const ok = await gsConfirm('このアラートを削除しますか？');
  if (!ok) return;
  try {
    await gsAlerts.delete(id);
    gsToast('削除しました', 'ok');
    await loadAlerts();
  } catch (e) { gsToast(e.message, 'error'); }
}

// ===== ログ =====
async function loadLogs() {
  try {
    const { logs } = await gsAlerts.logs();
    renderLogs(logs);
  } catch (e) {}
}

function renderLogs(logs) {
  const container = document.getElementById('logs-container');
  if (!logs || logs.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-title">発火履歴がありません</div></div>`;
    return;
  }
  container.innerHTML = `<div style="border:1px solid var(--bd);">
    ${logs.map(l => `
      <div class="log-item">
        <div class="log-msg">${l.message}</div>
        <div class="log-meta">${gsFormatDate(l.fired_at)} — ${l.alerts?.type ? TYPE_LABELS[l.alerts.type] : ''}</div>
      </div>
    `).join('')}
  </div>`;
}

// ===== タブ切り替え =====
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-alerts').style.display = tab === 'alerts' ? 'block' : 'none';
  document.getElementById('tab-logs').style.display = tab === 'logs' ? 'block' : 'none';
}

// ===== モーダル =====
async function loadBrandsForModal() {
  try {
    const { brands } = await gsBrands.list();
    const select = document.getElementById('m-brand');
    brands.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.id; opt.textContent = b.name;
      select.appendChild(opt);
    });
  } catch (e) {}
}

function openCreateModal() {
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

async function saveAlert() {
  const brand_id = document.getElementById('m-brand').value;
  const type = document.getElementById('m-type').value;
  const threshold = parseInt(document.getElementById('m-threshold').value) || 10;
  if (!brand_id) { gsToast('ブランドを選択してください', 'warn'); return; }
  try {
    await gsAlerts.create({ brand_id, type, threshold });
    gsToast('アラートを作成しました', 'ok');
    closeModal();
    await loadAlerts();
  } catch (e) { gsToast(e.message, 'error'); }
}
</script>
</body>
</html>
