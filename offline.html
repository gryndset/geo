<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オフライン — Geoscope</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1017;color:#cdd5e0;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px;}
.icon{font-size:48px;margin-bottom:24px;opacity:.4;}
h1{font-family:'DM Serif Display',serif;font-size:32px;font-weight:300;margin-bottom:12px;}
p{font-family:'DM Mono',monospace;font-size:11px;color:rgba(237,234,224,.4);letter-spacing:1px;line-height:1.8;margin-bottom:32px;}
button{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:12px 28px;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(237,234,224,.6);cursor:pointer;transition:all .2s;}
button:hover{border-color:rgba(139,124,248,.5);color:#89c4d4;}
</style>
</head>
<body>
<div>
  <div class="icon">◎</div>
  <h1>オフラインです</h1>
  <p>ネットワーク接続がありません。<br>接続を確認してから再試行してください。</p>
  <button onclick="location.reload()">再試行 →</button>
</div>
</body>
</html>
